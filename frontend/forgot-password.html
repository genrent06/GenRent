<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - GenRent</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Gen<span>Rent</span></span>
    </a>
    <div class="navbar-actions">
      <span style="color:#9ca3af;font-size:0.9rem;">Remember your password?</span>
      <a href="/login" class="btn btn-outline btn-sm">Login</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Forgot Password?</h2>
    <p>No worries! We'll send you a reset link.</p>

    <div id="alertBox"></div>

    <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
        <div class="form-hint">Enter the email associated with your account</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
        Send Reset Link
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--text-light);">
      Remember your password? <a href="/login">Login here</a>
    </p>
    <p style="text-align:center;margin-top:0.5rem;font-size:0.875rem;color:var(--text-light);">
      <a href="/">← Back to Home</a>
    </p>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
function showAlert(message, type = 'error') {
  const alertBox = document.getElementById('alertBox');
  const bgColor = type === 'success' ? '#dcfce7' : '#fee2e2';
  const textColor = type === 'success' ? '#166534' : '#dc2626';
  const icon = type === 'success' ? '✓' : '✕';

  alertBox.innerHTML = `
    <div style="background:${bgColor};border:1px solid ${type === 'success' ? '#bbf7d0' : '#fecaca'};border-radius:8px;padding:1rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.75rem;">
      <span style="background:${type === 'success' ? '#16a34a' : '#dc2626'};color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.85rem;">${icon}</span>
      <span style="color:${textColor};font-size:0.9rem;">${message}</span>
    </div>
  `;
}

async function handleForgotPassword(event) {
  event.preventDefault();

  const email = document.getElementById('email').value.trim();
  const submitBtn = document.getElementById('submitBtn');

  if (!email) {
    showAlert('Please enter your email address');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending...';

  try {
    const response = await fetch('/api/v1/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await response.json();

    if (response.ok) {
      showAlert(data.message || 'If an account exists with this email, a password reset link has been sent.', 'success');
      document.getElementById('forgotPasswordForm').reset();
    } else {
      showAlert(data.error || 'Failed to send reset link. Please try again.');
    }
  } catch (error) {
    showAlert('Network error. Please check your connection and try again.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send Reset Link';
  }
}
</script>
</body>
</html>
