<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - GenRent</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Gen<span>Rent</span></span>
    </a>
    <div class="navbar-actions">
      <a href="/login" class="btn btn-outline btn-sm">Login</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Reset Password</h2>
    <p>Enter your new password below.</p>

    <div id="alertBox"></div>

    <form id="resetPasswordForm" onsubmit="handleResetPassword(event)">
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" placeholder="Minimum 6 characters" required minlength="6" />
        <div class="form-hint">At least 6 characters</div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" placeholder="Re-enter your password" required minlength="6" />
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
        Reset Password
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--text-light);">
      Remember your password? <a href="/login">Login here</a>
    </p>
    <p style="text-align:center;margin-top:0.5rem;font-size:0.875rem;color:var(--text-light);">
      <a href="/">← Back to Home</a>
    </p>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
function showAlert(message, type = 'error') {
  const alertBox = document.getElementById('alertBox');
  const bgColor = type === 'success' ? '#dcfce7' : '#fee2e2';
  const textColor = type === 'success' ? '#166534' : '#dc2626';
  const icon = type === 'success' ? '✓' : '✕';

  alertBox.innerHTML = `
    <div style="background:${bgColor};border:1px solid ${type === 'success' ? '#bbf7d0' : '#fecaca'};border-radius:8px;padding:1rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.75rem;">
      <span style="background:${type === 'success' ? '#16a34a' : '#dc2626'};color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.85rem;">${icon}</span>
      <span style="color:${textColor};font-size:0.9rem;">${message}</span>
    </div>
  `;
}

// Get token from URL
function getTokenFromURL() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('token');
}

// Check if token exists
window.addEventListener('DOMContentLoaded', () => {
  const token = getTokenFromURL();
  if (!token) {
    showAlert('Invalid or missing reset token. Please request a new password reset.');
    document.getElementById('resetPasswordForm').style.display = 'none';
  }
});

async function handleResetPassword(event) {
  event.preventDefault();

  const newPassword = document.getElementById('new_password').value;
  const confirmPassword = document.getElementById('confirm_password').value;
  const token = getTokenFromURL();
  const submitBtn = document.getElementById('submitBtn');

  if (!token) {
    showAlert('Invalid or missing reset token. Please request a new password reset.');
    return;
  }

  if (newPassword !== confirmPassword) {
    showAlert('Passwords do not match. Please try again.');
    return;
  }

  if (newPassword.length < 6) {
    showAlert('Password must be at least 6 characters long.');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Resetting...';

  try {
    const response = await fetch('/api/v1/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: token,
        new_password: newPassword
      })
    });

    const data = await response.json();

    if (response.ok) {
      showAlert(data.message || 'Password reset successfully! Redirecting to login...', 'success');
      document.getElementById('resetPasswordForm').reset();
      // Redirect to login after 2 seconds
      setTimeout(() => {
        window.location.href = '/login';
      }, 2000);
    } else {
      showAlert(data.error || 'Failed to reset password. The token may be invalid or expired.');
    }
  } catch (error) {
    showAlert('Network error. Please check your connection and try again.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
