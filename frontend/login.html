<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - GenRent</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Gen<span>Rent</span></span>
    </a>
    <div class="navbar-actions">
      <span style="color:#9ca3af;font-size:0.9rem;">Don't have an account?</span>
      <a href="/register" class="btn btn-primary btn-sm">Register</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p>Login to your GenRent account</p>

    <div id="alertBox"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
        Login
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--text-light);">
      Don't have an account? <a href="/register">Register here</a>
    </p>
    <p style="text-align:center;margin-top:0.5rem;font-size:0.875rem;color:var(--text-light);">
      <a href="/">← Back to Home</a>
    </p>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
